
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: marutam_api
    ports:
      - "5001:5001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: marutam_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:5001/api
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
